<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TON Wallet Connect</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

<style>
body{
  margin:0;
  background:#0f0f1a;
  color:white;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

h1{
  margin-bottom:20px;
}

button{
  background:#0088cc;
  border:none;
  padding:15px 25px;
  color:white;
  font-size:16px;
  border-radius:10px;
  cursor:pointer;
  transition:0.15s;
  box-shadow:0 4px 0 #005f8d;
}

button:active{
  transform:translateY(3px);
  box-shadow:0 1px 0 #005f8d;
}

#status{
  margin-top:20px;
  font-size:14px;
  opacity:0.9;
}
</style>
</head>

<body>

<h1>Conectar Wallet TON</h1>

<button id="btn">VINCULAR WALLET</button>

<div id="status">Esperando acción...</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

let tonConnectUI = new TONConnectUI.TonConnectUI({
  manifestUrl: "https://ton-connect.github.io/demo-dapp-with-react-ui/tonconnect-manifest.json"
});

const btn = document.getElementById("btn");
const status = document.getElementById("status");

// CLICK BOTÓN
btn.addEventListener("click", async () => {

  status.innerText = "Abriendo conexión...";

  try {
    // abre selector oficial TON Connect
    await tonConnectUI.openModal();

  } catch (e) {
    console.log(e);

    status.innerText = "Abre manualmente la wallet";

    // fallback directo
    window.location.href = "https://app.tonkeeper.com/ton-connect";
  }
});

// estado conexión
tonConnectUI.onStatusChange(wallet => {

  if(wallet){
    status.innerText = "Wallet conectada ✅";
  } else {
    status.innerText = "No conectado";
  }
});
</script>

</body>
</html>
