<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Dashboard | Usuarios</title>
    <style>
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #0a0b10; 
            color: white; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        header {
            width: 100%;
            background: #161b22;
            padding: 20px 0;
            text-align: center;
            border-bottom: 1px solid #30363d;
            margin-bottom: 20px;
        }

        .container {
            width: 90%;
            max-width: 600px;
        }

        .card { 
            background: #161b22; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #30363d;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .card h2 { margin: 0; font-size: 1.2rem; color: #8b949e; }
        .card .value { font-size: 2.5rem; font-weight: bold; color: #00f2ff; margin-top: 10px; }

        .user-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .user-item { 
            padding: 12px; 
            border-bottom: 1px solid #30363d; 
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-item:last-child { border-bottom: none; }
        
        .user-name { font-weight: bold; color: #e6edf3; }
        .user-id { color: #8b949e; font-family: monospace; font-size: 12px; }

        .btn-refresh {
            background: #238636;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
            transition: 0.2s;
        }

        .btn-refresh:hover { background: #2ea043; }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <h1>📊 Panel de Control</h1>
</header>

<div class="container">
    <div class="card">
        <h2>Total de Usuarios</h2>
        <div id="total" class="value">--</div>
    </div>

    <button class="btn-refresh" onclick="load()">🔄 Actualizar Datos</button>

    <div class="card">
        <h3>Lista de Usuarios</h3>
        <div id="users" class="user-list">Cargando...</div>
    </div>
</div>

<script>
    // Configuración de Supabase (Tus credenciales temporales)
    const SUPABASE_URL = "https://jmmdqhxraphmaemevfja.supabase.co";
    const SUPABASE_KEY = "sb_publishable_UobkYsDWSBwcTZpJ3d8tsQ_0hQX0N_y";

    async function load() {
        const box = document.getElementById("users");
        const totalEl = document.getElementById("total");
        
        box.innerHTML = "Cargando...";
        
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/users?select=*`, {
                headers: {
                    "apikey": SUPABASE_KEY,
                    "Authorization": `Bearer ${SUPABASE_KEY}`
                }
            });
            
            if (!res.ok) throw new Error("Error de permisos o tabla inexistente");

            const users = await res.json();
            totalEl.innerText = users.length;
            
            box.innerHTML = "";
            if (users.length === 0) {
                box.innerHTML = "<p style='color:#8b949e; text-align:center;'>No hay usuarios registrados.</p>";
                return;
            }

            users.forEach(u => {
                const div = document.createElement("div");
                div.className = "user-item";
                div.innerHTML = `
                    <span class="user-name">${u.first_name || "Sin nombre"}</span>
                    <span class="user-id">ID: ${u.id}</span>
                `;
                box.appendChild(div);
            });
        } catch (err) {
            box.innerHTML = `<p style="color:#ff7b72; text-align:center;">Error de conexión. Revisa el RLS en Supabase.</p>`;
            totalEl.innerText = "Error";
            console.error(err);
        }
    }

    // Cargar automáticamente al abrir
    load();
</script>

</body>
</html>
