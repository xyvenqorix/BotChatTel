<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Monster Battle - TON</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background:#1a1a2e;
  color:white;
  font-family:monospace;
}
.btn {
  background:#0088cc;
  padding:12px;
  border-radius:10px;
}
</style>
</head>

<body class="flex flex-col items-center justify-center h-screen gap-4">

<h1>PIXEL MONSTER</h1>

<button id="connect" class="btn">CONECTAR WALLET</button>

<p id="status">No conectado</p>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

let tonConnectUI;

// 🔥 CONFIGURACIÓN CORRECTA
tonConnectUI = new TONConnectUI.TonConnectUI({
  manifestUrl: "https://ton-connect.github.io/demo-dapp-with-react-ui/tonconnect-manifest.json"
});

// ✅ BOTÓN
document.getElementById("connect").onclick = async () => {

  try {
    // 👇 ESTO ABRE TONKEEPER REAL
    await tonConnectUI.connectWallet();

  } catch (e) {
    console.log(e);
    alert("Instala Tonkeeper");
  }
};

// ✅ ESTADO
tonConnectUI.onStatusChange(wallet => {
  if(wallet){
    document.getElementById("status").innerText = "Wallet conectada ✅";
  }else{
    document.getElementById("status").innerText = "No conectado";
  }
});
</script>

</body>
</html>
