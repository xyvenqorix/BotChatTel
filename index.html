<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TON Connect Fix</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

<style>
body{
  background:#0f0f1a;
  color:white;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

button{
  background:#0088cc;
  border:none;
  padding:15px 25px;
  border-radius:10px;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.15s;
}

button:active{
  transform:scale(0.95);
}

#status{
  margin-top:20px;
  font-size:14px;
  opacity:0.9;
}
</style>
</head>

<body>

<h2>Conectar Wallet TON</h2>

<button id="connectBtn">CONECTAR</button>

<div id="status">Esperando acción...</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

let tonConnectUI = new TONConnectUI.TonConnectUI({
  manifestUrl: "https://ton-connect.github.io/demo-dapp-with-react-ui/tonconnect-manifest.json"
});

const btn = document.getElementById("connectBtn");
const status = document.getElementById("status");

btn.addEventListener("click", async () => {

  status.innerText = "Intentando abrir wallet...";

  try {
    await tonConnectUI.connectWallet();
    status.innerText = "Conectando...";

  } catch (e) {
    console.log(e);

    status.innerText = "No se pudo abrir automáticamente";

    tg.showPopup({
      title: "Wallet",
      message: "No se pudo abrir  automáticamente. Ábrela manualmente.",
      buttons: [{ type: "ok" }]
    });
  }
});

// estado conexión
tonConnectUI.onStatusChange(wallet => {
  if(wallet){
    status.innerText = "Wallet conectada ✅";
  } else {
    status.innerText = "No conectado";
  }
});
</script>

</body>
</html>
