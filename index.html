<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TON CONNECT FIX</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

<style>
body {
  background:#111;
  color:#fff;
  text-align:center;
  padding-top:50px;
  font-family:Arial;
}
button {
  padding:15px;
  background:#0088cc;
  border:none;
  border-radius:10px;
  color:white;
  font-size:16px;
}
</style>
</head>

<body>

<h2>Conectar Tonkeeper</h2>

<button id="btn">CONECTAR</button>

<p id="status">Esperando...</p>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

let tonConnectUI = new TONConnectUI.TonConnectUI({
  manifestUrl: "https://ton-connect.github.io/demo-dapp-with-react-ui/tonconnect-manifest.json"
});

// 🔥 BOTÓN REAL
document.getElementById("btn").onclick = async () => {

  try {
    const wallets = await tonConnectUI.getWallets();

    if (!wallets.length) {
      alert("No hay wallets disponibles");
      return;
    }

    // 👇 BUSCA TONKEEPER
    const tonkeeper = wallets.find(w => 
      w.name.toLowerCase().includes("tonkeeper")
    );

    if (tonkeeper) {
      // 👇 ESTO SÍ ABRE LA APP
      await tonConnectUI.connectWallet(tonkeeper);
    } else {
      // fallback
      await tonConnectUI.connectWallet(wallets[0]);
    }

  } catch (e) {
    console.log(e);
    alert("Error al conectar wallet");
  }
};

// ✅ ESTADO
tonConnectUI.onStatusChange(wallet => {
  if (wallet) {
    document.getElementById("status").innerText = "✅ Conectado";
  } else {
    document.getElementById("status").innerText = "❌ No conectado";
  }
});
</script>

</body>
</html>
