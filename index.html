<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Monster Battle - TON Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Press+Start+2P', cursive;
            background-color: #1a1a2e;
            color: #fff;
            overflow: hidden;
            touch-action: manipulation;
        }
        .pixel-border {
            border: 4px solid #fff;
            box-shadow: 4px 4px 0px #000;
        }
        .monster-float {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .battle-log {
            font-size: 8px;
            line-height: 1.5;
        }
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a2e 0%, #0d0d1f 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        #withdraw-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            width: 90%;
            background: #16213e;
        }
        /* BOTÓN MEJORADO */
        .ton-btn-custom {
            background: #0088cc;
            border-bottom: 4px solid #005f8d;
            transition: all 0.1s;
        }
        .ton-btn-custom:active {
            transform: translateY(2px);
            border-bottom-width: 0px;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-between h-screen p-4">

    <div id="auth-overlay">
        <h1 class="text-xl mb-6 text-yellow-400">PIXEL MONSTERS</h1>
        <div id="welcome-msg" class="text-[12px] mb-8">Preparando arena...</div>
        
        <div class="mb-8 flex flex-col items-center">
            <p class="text-[9px] mb-6 text-blue-300">CONECTA TU WALLET PARA JUGAR</p>
            
            <div id="ton-connect-trigger" class="ton-btn-custom flex items-center gap-3 px-6 py-4 rounded-xl cursor-pointer">
                <svg width="30" height="30" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M256 512c141.385 0 256-114.615 256-256S397.385 0 256 0 0 114.615 0 256s114.615 256 256 256z" fill="white"/>
                    <path d="M256 468c117.085 0 212-94.915 212-212S373.085 44 256 44 44 138.915 44 256s94.915 212 212 212z" fill="#0088cc"/>
                    <path d="M197.042 153.218c-10.748-8.243-25.962-1.393-27.108 12.186L143.2 468.46c-1.332 15.792 17.514 24.815 29.412 14.075L256 408.016l83.388 74.519c11.898 10.74 30.744 1.717 29.412-14.075l-26.734-303.056c-1.146-13.579-16.36-20.429-27.108-12.186L256 201.272l-58.958-48.054z" fill="white"/>
                </svg>
                <span class="text-[12px] font-bold">VINCULAR</span>
            </div>

            <div id="ton-connect-main" style="display:none"></div>
        </div>
    </div>

    <div class="w-full flex justify-between items-center bg-gray-800 p-2 rounded-lg pixel-border text-[8px]">
        <div class="flex flex-col">
            <span id="player-name">@Usuario</span>
            <span class="text-yellow-400 mt-1">Puntos: <span id="user-points">0</span></span>
        </div>
        <button onclick="openWithdraw()" class="bg-blue-600 px-2 py-1 rounded border border-white">RETIRAR</button>
    </div>

    <div id="game-scene" class="relative w-full flex-grow flex flex-col items-center justify-center space-y-8">
        <div class="flex flex-col items-center">
            <div class="w-48 bg-gray-700 h-3 mb-1 rounded-full overflow-hidden border-2 border-white">
                <div id="enemy-hp" class="bg-red-500 h-full w-full transition-all"></div>
            </div>
            <div id="enemy-container" class="monster-float"></div>
        </div>

        <div class="text-[10px] text-blue-300 italic animate-pulse">-- READY? --</div>

        <div class="flex flex-col items-center">
            <div id="player-container" class="monster-float"></div>
            <div class="w-48 bg-gray-700 h-3 mt-1 rounded-full overflow-hidden border-2 border-white">
                <div id="player-hp" class="bg-green-500 h-full w-full transition-all"></div>
            </div>
        </div>
    </div>

    <div class="w-full bg-black/50 p-3 rounded-t-xl pixel-border">
        <div id="battle-log" class="battle-log h-12 overflow-y-auto mb-2 text-gray-300 border-b border-gray-600">
            Conecta tu wallet para iniciar...
        </div>
        <div class="grid grid-cols-2 gap-2">
            <button onclick="attack()" class="bg-red-600 py-3 text-[10px] rounded active:scale-95 border-b-4 border-red-800">ATAQUE</button>
            <button onclick="heal()" class="bg-green-600 py-3 text-[10px] rounded active:scale-95 border-b-4 border-green-800">CURAR</button>
        </div>
    </div>

    <div id="withdraw-modal" class="p-6 pixel-border text-center">
        <h2 class="text-sm mb-4 text-yellow-400">RETIRAR PUNTOS</h2>
        <div class="bg-black/30 p-4 mb-4 border border-blue-500">
            <p id="withdraw-balance" class="text-xl text-green-400">0 PTS</p>
        </div>
        <div class="flex flex-col gap-2">
            <button onclick="processWithdraw()" class="bg-green-600 py-2 text-[10px]">CONFIRMAR</button>
            <button onclick="closeWithdraw()" class="bg-gray-600 py-2 text-[10px]">CERRAR</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let tonConnectUI;
        let isWalletConnected = false;

        let gameState = {
            points: parseInt(localStorage.getItem('pixel_points')) || 0,
            playerHP: 100,
            enemyHP: 100,
            isGameOver: false
        };

        window.onload = function() {
            tg.expand();
            tg.ready();

            const user = tg.initDataUnsafe?.user;
            const userName = user ? `@${user.username || user.first_name}` : "@Gamer";
            document.getElementById('player-name').innerText = userName;
            document.getElementById('user-points').innerText = gameState.points;

            document.getElementById('player-container').innerHTML = createMonsterSVG('#4ecca3', '#45b293');
            document.getElementById('enemy-container').innerHTML = createMonsterSVG('#ff4b5c', '#d63447', true);

            initTonConnect();
        };

        function initTonConnect() {
            // Usando manifest oficial de prueba para asegurar que cargue
            tonConnectUI = new TONConnectUI.TonConnectUI({
                manifestUrl: 'https://raw.githubusercontent.com/ton-connect/demo-dapp/main/public/tonconnect-manifest.json',
                buttonRootId: 'ton-connect-main'
            });

            // Acción del botón personalizado
            document.getElementById('ton-connect-trigger').addEventListener('click', async () => {
                tg.HapticFeedback.impactOccurred('medium');
                try {
                    await tonConnectUI.openModal();
                } catch(e) {
                    console.error("Error al abrir modal", e);
                }
            });

            // Monitorear conexión
            tonConnectUI.onStatusChange(wallet => {
                if (wallet) {
                    isWalletConnected = true;
                    document.getElementById('auth-overlay').style.display = 'none';
                    updateLog("Wallet conectada. ¡A pelear!");
                } else {
                    isWalletConnected = false;
                    document.getElementById('auth-overlay').style.display = 'flex';
                }
            });
        }

        function createMonsterSVG(color1, color2, isEnemy = false) {
            const flip = isEnemy ? '' : 'transform="scale(-1, 1) translate(-24, 0)"';
            return `
                <svg width="100" height="100" viewBox="0 0 24 24" ${flip} xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
                    <rect x="6" y="8" width="12" height="10" fill="${color1}" />
                    <rect x="8" y="6" width="8" height="2" fill="${color1}" />
                    <rect x="13" y="9" width="2" height="2" fill="white" />
                    <rect x="14" y="10" width="1" height="1" fill="black" />
                    <rect x="7" y="18" width="3" height="2" fill="${color2}" />
                    <rect x="14" y="18" width="3" height="2" fill="${color2}" />
                </svg>
            `;
        }

        function attack() {
            if(!isWalletConnected || gameState.isGameOver) return;
            tg.HapticFeedback.impactOccurred('light');
            let damage = Math.floor(Math.random() * 20) + 15;
            gameState.enemyHP -= damage;
            updateLog(`Ataque: -${damage} HP`);
            
            if(gameState.enemyHP <= 0) {
                gameState.enemyHP = 0;
                win();
            } else {
                setTimeout(() => {
                    let eDmg = Math.floor(Math.random() * 15) + 5;
                    gameState.playerHP -= eDmg;
                    updateLog(`Enemigo: -${eDmg} HP`);
                    if(gameState.playerHP <= 0) lose();
                    updateUI();
                }, 400);
            }
            updateUI();
        }

        function heal() {
            if(!isWalletConnected || gameState.isGameOver) return;
            gameState.playerHP = Math.min(100, gameState.playerHP + 25);
            updateLog("Curación: +25 HP");
            updateUI();
        }

        function updateUI() {
            document.getElementById('enemy-hp').style.width = `${gameState.enemyHP}%`;
            document.getElementById('player-hp').style.width = `${gameState.playerHP}%`;
        }

        function updateLog(msg) {
            const log = document.getElementById('battle-log');
            const p = document.createElement('p');
            p.innerText = `> ${msg}`;
            log.prepend(p);
        }

        function win() {
            gameState.isGameOver = true;
            gameState.points += 10;
            localStorage.setItem('pixel_points', gameState.points);
            document.getElementById('user-points').innerText = gameState.points;
            updateLog("¡GANASTE! +10 PTS");
            tg.HapticFeedback.notificationOccurred('success');
            setTimeout(resetGame, 2000);
        }

        function lose() {
            gameState.isGameOver = true;
            updateLog("Derrota...");
            tg.HapticFeedback.notificationOccurred('error');
            setTimeout(resetGame, 2000);
        }

        function resetGame() {
            gameState.playerHP = 100; gameState.enemyHP = 100;
            gameState.isGameOver = false;
            updateUI();
            updateLog("Nueva batalla...");
        }

        function openWithdraw() {
            document.getElementById('withdraw-balance').innerText = `${gameState.points} PTS`;
            document.getElementById('withdraw-modal').style.display = 'block';
        }

        function closeWithdraw() {
            document.getElementById('withdraw-modal').style.display = 'none';
        }

        function processWithdraw() {
            if (gameState.points < 50) {
                tg.showAlert("Necesitas al menos 50 puntos.");
                return;
            }
            updateLog("Procesando en blockchain...");
            closeWithdraw();
        }
    </script>
</body>
</html>
