<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Monster Battle</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>
    <div id="auth-overlay">
        <h1 class="game-title">PIXEL MONSTERS</h1>
        <p class="subtitle">CONECTA TU WALLET PARA ENTRAR</p>
        
        <div id="btn-vincular" class="ton-connect-btn">
            <img src="https://ton.org/download/ton_symbol.svg" alt="TON" class="ton-logo">
            <span>VINCULAR WALLET</span>
        </div>
        
        <div id="ton-connect-hidden" style="display: none;"></div>
    </div>

    <div class="game-container">
        <div class="header">
            <div class="user-info">
                <span id="player-name">Cargando...</span>
                <span class="points">PTS: <span id="user-points">0</span></span>
            </div>
            <div id="wallet-status" class="status-dot"></div>
        </div>

        <div class="battle-arena">
            <div class="monster enemy">
                <div class="hp-bar"><div id="enemy-hp" class="hp-fill red"></div></div>
                <div id="enemy-sprite"></div>
            </div>
            
            <div class="vs">VS</div>

            <div class="monster player">
                <div id="player-sprite"></div>
                <div class="hp-bar"><div id="player-hp" class="hp-fill green"></div></div>
            </div>
        </div>

        <div class="controls">
            <div id="battle-log"></div>
            <div class="btn-group">
                <button onclick="game.attack()" class="btn-atk">ATAQUE</button>
                <button onclick="game.heal()" class="btn-heal">CURAR</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
