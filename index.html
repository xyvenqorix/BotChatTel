<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Dashboard</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #0a0b10; color: white; }
        .top { display: flex; background: #161b22; position: sticky; top: 0; }
        .top button { flex: 1; padding: 15px; background: #161b22; border: none; color: #8b949e; cursor: pointer; font-weight: bold; }
        .top button.active { color: #00f2ff; border-bottom: 2px solid #00f2ff; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: #161b22; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #30363d; }
        .user { padding: 8px; border-bottom: 1px solid #30363d; font-size: 14px; }
        textarea { width: 100%; height: 120px; background: #0d1117; color: white; border: 1px solid #30363d; border-radius: 8px; padding: 10px; box-sizing: border-box; }
        button.send { width: 100%; padding: 15px; background: #00f2ff; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; border-radius: 8px; color: #0a0b10; }
        button.send:disabled { background: #30363d; color: #8b949e; }
    </style>
</head>
<body>

<div class="top">
    <button id="btn-dash" class="active" onclick="show('dash')">📊 Dashboard</button>
    <button id="btn-msg" onclick="show('msg')">📨 Mensajes</button>
</div>

<div id="dash" class="page active">
    <div class="card">
        <h2>Total usuarios: <span id="total">--</span></h2>
    </div>
    <div class="card">
        <h3>Lista de Usuarios</h3>
        <div id="users">Cargando datos...</div>
    </div>
</div>

<div id="msg" class="page">
    <div class="card">
        <h3>Enviar mensaje masivo</h3>
        <textarea id="text" placeholder="Escribe el mensaje para tus usuarios..."></textarea>
        <button class="send" id="btnSend" onclick="send()">Enviar a todos</button>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://jmmdqhxraphmaemevfja.supabase.co";
    const SUPABASE_KEY = "sb_publishable_UobkYsDWSBwcTZpJ3d8tsQ_0hQX0N_y";
    const TELEGRAM_TOKEN = "8744945852:AAGKyUVHutoTDP8RhV-YFTmYgLnvr5q5lhE";

    async function load() {
        const box = document.getElementById("users");
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/users?select=*`, {
                headers: {
                    "apikey": SUPABASE_KEY,
                    "Authorization": `Bearer ${SUPABASE_KEY}`
                }
            });
            
            if (!res.ok) throw new Error("Fallo en la conexión o permisos (RLS)");

            const users = await res.json();
            document.getElementById("total").innerText = users.length;
            
            box.innerHTML = "";
            if (users.length === 0) {
                box.innerHTML = "No hay usuarios en la base de datos.";
                return;
            }

            users.forEach(u => {
                const div = document.createElement("div");
                div.className = "user";
                div.innerText = `${u.first_name || "Sin nombre"} | ID: ${u.id}`;
                box.appendChild(div);
            });
        } catch (err) {
            box.innerHTML = `<span style="color:red">Error: Verifica el RLS en Supabase</span>`;
            console.error(err);
        }
    }

    async function send() {
        const text = document.getElementById("text").value;
        const btn = document.getElementById("btnSend");
        if (!text) return alert("Escribe un mensaje");

        btn.innerText = "Enviando...";
        btn.disabled = true;

        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/users?select=id`, {
                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
            });
            const users = await res.json();

            for (const u of users) {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chat_id: u.id, text: text })
                });
            }
            alert("¡Mensaje enviado a todos!");
            document.getElementById("text").value = "";
        } catch (err) {
            alert("Error al procesar el envío");
        } finally {
            btn.innerText = "Enviar a todos";
            btn.disabled = false;
        }
    }

    function show(id) {
        document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
        document.querySelectorAll(".top button").forEach(b => b.classList.remove("active"));

        document.getElementById(id).classList.add("active");
        if(id === 'dash') document.getElementById('btn-dash').classList.add('active');
        if(id === 'msg') document.getElementById('btn-msg').classList.add('active');
    }

    load();
</script>

</body>
</html>
